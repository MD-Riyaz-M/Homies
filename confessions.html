<!DOCTYPE html>
<html lang="en">

    <style>
        body {
            margin: 0;

        h1 {
            margin-top: 40px;
            font-size: 2.8rem;
        }

            opacity: 0.85;
            margin-bottom: 10px;
        }

        .warning {
            color: #ffcc00;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .form-container {
            width: 95%;
            max-width: 750px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        iframe {
            width: 100%;
            height: 520px;
            border: none;
            border-radius: 15px;
        }

        .back-btn {
            display: inline-block;
            margin: 40px 0 60px;
            padding: 12px 25px;
            background: #ffcc00;
            color: black;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover {

        }
    </style>
</head>
